### COUNTRY SELECTION ###
 OTHER_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nThe nations of the world, great and small, are not all content to hold their breath awaiting the outbreak of another global conflict. From major powers on the brink of civil war to the many nations formed and transformed in recent history, all will have to make difficult decisions and balance ideals with pragmatism to have an impact on the future of the world."
 GRY_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nFor centuries, the Cossacks of the Gryphian Host have plied the plains of the Evya River Basin, farming, flying, fighting, and looting to make their living. Once an ancient border march of the Griffonian Empire, they have become famous as the terror of riverponies and a protector of Griffons - though they have occasionally "slipped" and stolen from their charges. Now, in 1007, the Host faces rapidly dwindling coffers. A raid must be launched to make up for this deficit - but the world is far more dangerous than it used to be. Communists agitate in the countryside, secret societies meet in the shadows. If the upcoming raid were to go wrong, chaos would ensue..."
 LUS_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nThe griffons of Lushi have long held on to their backwards ways. The country is divided between powerful lords, who rule over their serfs. These serfs are still tied to their land and largely uneducated. However, the young prince, Elias, seeks to reform the principality by dealing with the lords and setting the serfs free. But his brother Gerar has other plans for the nation, if he can come to power..."
 GRU_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nIt has not been long since the free towns of Gryphus regained their golden liberty from the despotic Empire, but already internal strife threatens the country and its treasured freedom. Both fanatical knights from Herzland and a Sicameonese merchant company strive to gain more power, caring little for the desires of the towns themselves. Something must be done soon, ere prized liberty is once again lost..."
 GRW_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nThe Prywhenian Liberation Army movement was born in the Kingdom of Brodfeld. Sparked by brutality of the king the revolutionary spirit of the griffons of Prywhen inspired an organisation of the resistance against the bourgeoisie. It managed to capture the popular support of peasants and workers throughout the country. For two years a devastating civil war is going on, more characterised by guerrilla warfare and raids than a full-scale war. But now the peasants and the proletariat have picked themselves up to make the final push into the royalists' nest of vipers. From there on, Prywhen will finally have a chance to decide their own destiny."
 BRF_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nThe Kingdom of Brodfeld is a young nation whose recent history is full of suffering. From the Great Famine of 995 to the present civil war against communist revolutionaries, griffons of Prywhen have endured much hardship. Some seek salvation from the King and the Gods that aid him while others hope for reforms that will turn the Kingdom into a constitutional monarchy, yet both fight together against the Red Menace that seeks to undo all that they hold dear. Only if they are victorious can they have any hope of seeing their country rise from the ashes like a golden Phoenix."
